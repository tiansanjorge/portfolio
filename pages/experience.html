    <script>
      (function () {
        try {
          var lang = localStorage.getItem("site_lang") || "en";

        } catch (e) {

    <style>
      /* Scroll reveal animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeInRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .scroll-reveal {
        opacity: 0;
      }

      .scroll-reveal.animate-fade-up {
        transform: translateY(30px);
      }

      .scroll-reveal.animate-fade-left {
        transform: translateX(-30px);
      }

      .scroll-reveal.animate-fade-right {
        transform: translateX(30px);
      }

      .scroll-reveal.visible {
        animation-play-state: running;
      }

      .animate-fade-up.visible {
        animation: fadeInUp 0.8s ease-out both;
      }

      .animate-fade-left.visible {
        animation: fadeInLeft 0.8s ease-out both;
      }

      .animate-fade-right.visible {
        animation: fadeInRight 0.8s ease-out both;
      }

      .delay-1 {
        animation-delay: 0.1s;
      }
      .delay-2 {
        animation-delay: 0.2s;
      }
    </style>
  </head>

    <script src="../script.js"></script>
    <script>
      document.querySelectorAll(".exp-tab-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".exp-tab-btn").forEach(function (b) {
            b.classList.remove("active");
          });
          document.querySelectorAll(".exp-panel").forEach(function (p) {
            p.classList.remove("active");
          });
          btn.classList.add("active");
          document
            .getElementById("panel-" + btn.dataset.target)
            .classList.add("active");
        });
      });
    </script>
